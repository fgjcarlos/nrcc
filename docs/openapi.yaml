  # ── Reusable Responses ──────────────────────────────────────────────────────────

  responses:
    BadRequest:
      description: Bad request — invalid input or missing required fields
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error:
              code: INVALID_REQUEST
              message: Username and password are required
            timestamp: "2026-05-24T14:00:00Z"

    Unauthorized:
      description: Missing or invalid authentication token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error:
              code: UNAUTHORIZED
              message: Authentication required
            timestamp: "2026-05-24T14:00:00Z"

    Forbidden:
      description: Authenticated but insufficient permissions (admin required)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error:
              code: FORBIDDEN
              message: Admin access required
            timestamp: "2026-05-24T14:00:00Z"

    NotFound:
      description: The requested resource was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error:
              code: NOT_FOUND
              message: User not found
            timestamp: "2026-05-24T14:00:00Z"

    Conflict:
      description: Conflict — resource already exists or a concurrent operation is in progress
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error:
              code: ALREADY_INITIALIZED
              message: System already configured with users
            timestamp: "2026-05-24T14:00:00Z"

    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error:
              code: RATE_LIMITED
              message: Too many requests, please try again later
            timestamp: "2026-05-24T14:00:00Z"

    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error:
              code: BACKUP_ERROR
              message: Failed to create backup
            timestamp: "2026-05-24T14:00:00Z"

    ServiceUnavailable:
      description: Feature not available in this deployment (e.g., Docker endpoints when not in Docker)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
          example:
            success: false
            error:
              code: DOCKER_NOT_AVAILABLE
              message: Not running inside a Docker container
            timestamp: "2026-05-24T14:00:00Z"
