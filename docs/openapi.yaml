openapi: 3.1.0
info:
  title: NRCC — Node-RED Control Center API
  version: 1.0.0
  description: |
    REST API for the Node-RED Control Center (NRCC).

    ## Authentication

    Most endpoints require a short-lived Bearer JWT (≈15 min) obtained from
    `/api/auth/login` or `/api/auth/setup`. Refresh tokens are managed via an
    httpOnly cookie (`nrcc_refresh`) and rotated automatically on each call to
    `/api/auth/refresh`.

    ## Response Envelope

    Every JSON endpoint wraps its payload in a standard envelope:

    **Success:**
    ```json
    { "success": true, "data": <T>, "timestamp": "<RFC3339>" }
    ```

    **Error:**
    ```json
    { "success": false, "error": { "code": "ERROR_CODE", "message": "..." }, "timestamp": "<RFC3339>" }
    ```
  license:
    name: MIT
  contact:
    name: NRCC Team

servers:
  - url: /
    description: Same-origin (default deployment)

tags:
  - name: Health
    description: Health and readiness checks
  - name: Auth
    description: Authentication and user management
  - name: Config
    description: Node-RED configuration management
  - name: System
    description: Host and system information
  - name: Backups
    description: Backup creation, restore, and scheduler management
  - name: Environment
    description: Environment variable management
  - name: Flows
    description: Node-RED flow management and versioning
  - name: Libraries
    description: npm package (library) management
  - name: Updates
    description: Node-RED update management
  - name: Files
    description: File upload and management
  - name: Docker
    description: Docker container control
  - name: Logs
    description: Node-RED runtime logs
  - name: AI
    description: AI-assisted flow analysis (stubs — not yet implemented)

security: []

paths:
  # ─── Health ──────────────────────────────────────────────────────────────────

  /api/health:
    get:
      tags: [Health]
      operationId: getHealth
      summary: API health check
      description: Returns a simple status object to confirm the API is reachable.
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_HealthStatus"

  /healthz:
    get:
      tags: [Health]
      operationId: getHealthz
      summary: Kubernetes-style liveness probe
      description: Returns HTTP 200 with an empty body when the process is alive.
      security: []
      responses:
        "200":
          description: Process is alive
          content:
            text/plain:
              schema:
                type: string
                example: ""

  /metrics:
    get:
      tags: [Health]
      operationId: getMetrics
      summary: Prometheus metrics
      description: Exposes Prometheus-format metrics. Not a JSON endpoint.
      security: []
      responses:
        "200":
          description: Prometheus text exposition format
          content:
            text/plain:
              schema:
                type: string

  # ─── Auth — Public ────────────────────────────────────────────────────────────

  /api/auth/status:
    get:
      tags: [Auth]
      operationId: getAuthStatus
      summary: Check initialization status
      description: Returns whether the system has been initialized with at least one user.
      security: []
      responses:
        "200":
          description: Initialization status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_StatusResponse"

  /api/auth/setup:
    post:
      tags: [Auth]
      operationId: postAuthSetup
      summary: Initial admin setup
      description: |
        Creates the first admin user. Only works when no users exist yet.
        Sets an httpOnly refresh cookie on success.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupRequest"
      responses:
        "201":
          description: Admin user created and access token returned
          headers:
            Set-Cookie:
              description: httpOnly refresh cookie (`nrcc_refresh`)
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/auth/login:
    post:
      tags: [Auth]
      operationId: postAuthLogin
      summary: Log in
      description: |
        Authenticates with username and password. Returns a short-lived JWT and
        sets an httpOnly refresh cookie.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Successful login
          headers:
            Set-Cookie:
              description: httpOnly refresh cookie (`nrcc_refresh`)
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /api/auth/refresh:
    post:
      tags: [Auth]
      operationId: postAuthRefresh
      summary: Refresh access token
      description: |
        Reads the `nrcc_refresh` httpOnly cookie, validates the session, rotates
        the refresh token, and issues a new short-lived access JWT. No request
        body required.
      security: []
      parameters:
        - in: cookie
          name: nrcc_refresh
          required: true
          schema:
            type: string
          description: httpOnly refresh token cookie
      responses:
        "200":
          description: New access token issued
          headers:
            Set-Cookie:
              description: Rotated httpOnly refresh cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_AuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Auth — Protected ─────────────────────────────────────────────────────────

  /api/auth/me:
    get:
      tags: [Auth]
      operationId: getAuthMe
      summary: Get current user
      description: Returns the profile of the authenticated user.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_CCUserPublic"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/auth/logout:
    post:
      tags: [Auth]
      operationId: postAuthLogout
      summary: Log out
      description: |
        Invalidates the client-side token. JWT logout is stateless; the client
        must discard the token. The refresh cookie should be cleared by the client.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_BoolSuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/auth/users:
    get:
      tags: [Auth]
      operationId: getAuthUsers
      summary: List all users
      description: "**Admin only.** Returns all registered users."
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_UserListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Auth]
      operationId: postAuthUsers
      summary: Create a user
      description: "**Admin only.** Creates a new user with the given username, password, and role."
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_CCUserPublic"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/auth/users/{id}:
    delete:
      tags: [Auth]
      operationId: deleteAuthUser
      summary: Delete a user
      description: "**Admin only.** Deletes a user by ID. Cannot delete self or the last admin."
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: User deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_BoolSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Auth]
      operationId: patchAuthUser
      summary: Update a user's role
      description: "**Admin only.** Updates the role of a user. Cannot demote the last admin."
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_CCUserPublic"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/auth/users/{id}/password:
    patch:
      tags: [Auth]
      operationId: patchAuthUserPassword
      summary: Change a user's password
      description: |
        Changes the password for the specified user.
        Admins can change any user's password; non-admins can only change their own.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordChangeRequest"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_BoolSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Config ────────────────────────────────────────────────────────────────────

  /api/config:
    get:
      tags: [Config]
      operationId: getConfig
      summary: Get Node-RED configuration
      description: Returns the current Node-RED `settings.js` configuration as a structured object.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_NodeRedConfig"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Config]
      operationId: postConfig
      summary: Save Node-RED configuration
      description: "**Admin only.** Overwrites the Node-RED configuration."
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NodeRedConfig"
      responses:
        "200":
          description: Saved configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_NodeRedConfig"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/config/default:
    get:
      tags: [Config]
      operationId: getConfigDefault
      summary: Get default configuration
      description: Returns the built-in default Node-RED configuration values.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Default configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_NodeRedConfig"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/config/validate:
    post:
      tags: [Config]
      operationId: postConfigValidate
      summary: Validate a configuration object
      description: Validates a Node-RED configuration without persisting it.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NodeRedConfig"
      responses:
        "200":
          description: Configuration is valid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_ValidResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/settings/raw:
    get:
      tags: [Config]
      operationId: getSettingsRaw
      summary: Get raw settings.js content
      description: Returns the raw text content of the Node-RED `settings.js` file.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Raw settings document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_SettingsDocument"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Config]
      operationId: postSettingsRaw
      summary: Save raw settings.js content
      description: "**Admin only.** Overwrites the `settings.js` file with the supplied content."
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RawSettingsRequest"
      responses:
        "200":
          description: Updated settings document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_SettingsDocument"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ─── System ────────────────────────────────────────────────────────────────────

  /api/bootstrap/status:
    get:
      tags: [System]
      operationId: getBootstrapStatus
      summary: Get host bootstrap status
      description: |
        Returns a detailed snapshot of the host environment including Node.js, npm,
        Node-RED binary, Docker, and installation mode detection.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Host status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_HostStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/system/info:
    get:
      tags: [System]
      operationId: getSystemInfo
      summary: Get system resource information
      description: Returns real-time CPU, memory, and disk statistics for the host.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: System information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_SystemInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Backups ───────────────────────────────────────────────────────────────────

  /api/backups:
    get:
      tags: [Backups]
      operationId: getBackups
      summary: List backups
      description: Returns a paginated list of available backups with optional sorting.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
        - name: sort
          in: query
          description: Field to sort by
          schema:
            type: string
            enum: [date, size, status]
            default: date
        - name: order
          in: query
          description: Sort direction
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: Paginated backup list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_PaginatedBackups"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Backups]
      operationId: postBackup
      summary: Create a backup
      description: Triggers an immediate manual backup.
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBackupRequest"
      responses:
        "200":
          description: Created backup
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_Backup"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/backups/status:
    get:
      tags: [Backups]
      operationId: getBackupStatus
      summary: Get scheduler status
      description: Returns the runtime state of the backup scheduler.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Backup scheduler status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_BackupSchedulerStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/backups/observability:
    get:
      tags: [Backups]
      operationId: getBackupObservability
      summary: Get backup observability details
      description: Returns scheduler status, storage summary, latest backup, and recent events.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Observability dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_BackupObservability"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/backups/storage:
    get:
      tags: [Backups]
      operationId: getBackupStorage
      summary: Get backup storage info
      description: Returns aggregate storage statistics for all stored backups.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Storage statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_BackupStorageInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/backups/config:
    get:
      tags: [Backups]
      operationId: getBackupConfig
      summary: Get backup configuration
      description: Returns scheduler and retention settings.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Backup configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_BackupConfig"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Backups]
      operationId: postBackupConfig
      summary: Update backup configuration
      description: "**Admin only.** Updates scheduler and retention settings."
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BackupConfig"
      responses:
        "200":
          description: Updated backup configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_BackupConfig"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/backups/{id}:
    get:
      tags: [Backups]
      operationId: getBackupById
      summary: Get backup manifest
      description: Returns the full manifest of a single backup including file list.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/BackupId"
      responses:
        "200":
          description: Backup manifest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_BackupManifest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Backups]
      operationId: deleteBackup
      summary: Delete a backup
      description: Permanently deletes a backup archive.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/BackupId"
      responses:
        "204":
          description: Backup deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/backups/{id}/download:
    get:
      tags: [Backups]
      operationId: downloadBackup
      summary: Download backup archive
      description: Streams the backup as a binary ZIP file.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/BackupId"
      responses:
        "200":
          description: ZIP archive stream
          content:
            application/zip:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/backups/{id}/restore:
    post:
      tags: [Backups]
      operationId: restoreBackup
      summary: Restore a backup
      description: |
        Restores Node-RED data from the specified backup. A pre-restore backup is
        created automatically before restoring. Returns the ID of that pre-restore backup.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/BackupId"
      responses:
        "200":
          description: Restore initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_RestoreResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/scheduler/config:
    post:
      tags: [Backups]
      operationId: postSchedulerConfig
      summary: Validate and apply a cron expression
      description: Validates a cron expression and applies it to the backup scheduler.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SchedulerConfigRequest"
      responses:
        "200":
          description: Cron validated and applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_SchedulerConfigResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/scheduler/history:
    get:
      tags: [Backups]
      operationId: getSchedulerHistory
      summary: Get scheduler run history
      description: Returns paginated scheduler execution history.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Paginated scheduler history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_PaginatedSchedulerHistory"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/storage/retention:
    patch:
      tags: [Backups]
      operationId: patchStorageRetention
      summary: Update retention policy
      description: Sets the number of days to retain backups before automatic pruning.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetentionConfigRequest"
      responses:
        "200":
          description: Retention policy updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_RetentionConfigResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Environment Variables ──────────────────────────────────────────────────────

  /api/env:
    get:
      tags: [Environment]
      operationId: getEnv
      summary: List environment variables
      description: Returns all defined environment variables including their type and metadata.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Environment variable list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_EnvVarList"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Environment]
      operationId: postEnv
      summary: Set an environment variable
      description: |
        Creates or updates an environment variable. If Node-RED is currently running,
        it is restarted automatically. The `restarted` field in the response indicates
        whether a restart was triggered.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetEnvRequest"
      responses:
        "200":
          description: Variable set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_EnvSetResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/env/{key}:
    delete:
      tags: [Environment]
      operationId: deleteEnv
      summary: Delete an environment variable
      description: |
        Deletes the specified environment variable. If Node-RED is running it is
        restarted automatically. Returns 204 if no restart occurred, or 200 with
        a restart confirmation if one did.
      security:
        - bearerAuth: []
      parameters:
        - name: key
          in: path
          required: true
          description: Environment variable key
          schema:
            type: string
            example: MY_VAR
      responses:
        "204":
          description: Variable deleted (no restart triggered)
        "200":
          description: Variable deleted and Node-RED restarted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_EnvSetResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/env/dotenv:
    get:
      tags: [Environment]
      operationId: getDotenv
      summary: Get .env file content
      description: Returns the raw text content of the `data/.env` file.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: .env file content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_DotenvContent"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      tags: [Environment]
      operationId: putDotenv
      summary: Save .env file content
      description: |
        Replaces the entire `data/.env` file. If Node-RED is running it is
        restarted automatically.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DotenvWriteRequest"
      responses:
        "200":
          description: File saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_EnvSetResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Flows ─────────────────────────────────────────────────────────────────────

  /api/flows:
    get:
      tags: [Flows]
      operationId: getFlows
      summary: List all flows
      description: Returns all Node-RED flows.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Flow list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_FlowList"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/flows/export:
    get:
      tags: [Flows]
      operationId: exportFlows
      summary: Export flows as JSON file
      description: Downloads the Node-RED `flows.json` as an attachment.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: flows.json file download
          headers:
            Content-Disposition:
              schema:
                type: string
                example: 'attachment; filename="flows.json"'
          content:
            application/json:
              schema:
                type: array
                items: {}
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/flows/analyze:
    post:
      tags: [Flows]
      operationId: analyzeFlows
      summary: Analyze flows
      description: Analyzes the current flows. Returns analysis results (stub implementation).
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_AnyObject"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/flows/versions:
    get:
      tags: [Flows]
      operationId: getFlowVersions
      summary: List flow versions
      description: Returns the version history of captured flow snapshots.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Flow version list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_FlowVersionList"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Flows]
      operationId: postFlowSnapshot
      summary: Capture a manual snapshot
      description: Captures the current state of all flows as a new version snapshot.
      security:
        - bearerAuth: []
      responses:
        "201":
          description: Snapshot captured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_MessageResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/flows/versions/{from}/diff/{to}:
    get:
      tags: [Flows]
      operationId: getFlowVersionDiff
      summary: Diff two flow versions
      description: Returns the structural diff between two flow snapshots.
      security:
        - bearerAuth: []
      parameters:
        - name: from
          in: path
          required: true
          description: Source version ID
          schema:
            type: string
        - name: to
          in: path
          required: true
          description: Target version ID
          schema:
            type: string
      responses:
        "200":
          description: Flow diff
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_FlowDiff"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/flows/versions/{id}/revert:
    post:
      tags: [Flows]
      operationId: revertFlowVersion
      summary: Revert to a flow version
      description: |
        Reverts all flows to the specified snapshot. A pre-revert snapshot is
        captured automatically before overwriting.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Version ID to revert to
          schema:
            type: string
      responses:
        "200":
          description: Flows reverted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_RevertResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/flows/{id}:
    get:
      tags: [Flows]
      operationId: getFlowById
      summary: Get a single flow
      description: Returns a single flow by its ID.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Flow ID
          schema:
            type: string
      responses:
        "200":
          description: Flow object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_Flow"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── Libraries ─────────────────────────────────────────────────────────────────

  /api/libraries:
    get:
      tags: [Libraries]
      operationId: getLibraries
      summary: List installed libraries
      description: Returns all npm packages currently installed in the Node-RED user directory.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Library list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_LibraryList"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/libraries/install:
    post:
      tags: [Libraries]
      operationId: installLibrary
      summary: Install a library
      description: Installs an npm package into the Node-RED user directory via npm.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstallLibraryRequest"
      responses:
        "200":
          description: Package installed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_LibraryInstallResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/libraries/search:
    post:
      tags: [Libraries]
      operationId: searchLibraries
      summary: Search npm registry
      description: |
        Searches the npm registry for packages matching the query. Returns at most
        10 results. On registry errors an empty array is returned (non-fatal).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchLibraryRequest"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_LibrarySearchResultList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/libraries/{name}:
    delete:
      tags: [Libraries]
      operationId: deleteLibrary
      summary: Uninstall a library
      description: Uninstalls the specified npm package from the Node-RED user directory.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/LibraryName"
      responses:
        "204":
          description: Package uninstalled
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/libraries/{name}/check:
    get:
      tags: [Libraries]
      operationId: checkLibrary
      summary: Check library availability
      description: Checks whether a package name exists in the npm registry.
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/LibraryName"
      responses:
        "200":
          description: Availability result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_LibraryAvailability"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Updates ───────────────────────────────────────────────────────────────────

  /api/updates/status:
    get:
      tags: [Updates]
      operationId: getUpdatesStatus
      summary: Get cached update status
      description: |
        Returns the last known update status from cache (in-memory + persisted to
        `data/update_cache.json`). This is a fast, non-blocking read — no npm call
        is made.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Cached update status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_UpdateCacheEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/updates/check:
    get:
      tags: [Updates]
      operationId: getUpdatesCheck
      summary: Force update check
      description: |
        Performs a fresh npm version check (may take up to 10–35 seconds). Concurrent
        calls are deduplicated. Use this for manual "Check Now" actions.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Fresh update status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_UpdateCacheEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/updates/apply:
    post:
      tags: [Updates]
      operationId: postUpdatesApply
      summary: Apply pending update
      description: |
        Starts an asynchronous update flow: BackingUp → Applying → Completed/Failed.
        Returns immediately with the current flow state. Poll `GET /api/updates/state`
        every 500 ms to track progress.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Update flow started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_UpdateApplyResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/updates/state:
    get:
      tags: [Updates]
      operationId: getUpdatesState
      summary: Get current update flow state
      description: |
        Returns the current state of an ongoing (or last completed) update flow.
        Poll every 500 ms while state is not `Idle`, `Completed`, or `Failed`.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Update flow state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_UpdateFlowState"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/updates/history:
    get:
      tags: [Updates]
      operationId: getUpdatesHistory
      summary: Get update history
      description: Returns past update applications. Currently returns an empty list (stub).
      x-status: stub
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Update history (currently empty)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_EmptyList"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Files ─────────────────────────────────────────────────────────────────────

  /api/files:
    get:
      tags: [Files]
      operationId: getFiles
      summary: List uploaded files
      description: Returns metadata for all files in the uploads directory.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: File list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_FileList"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/files/upload:
    post:
      tags: [Files]
      operationId: uploadFile
      summary: Upload a file
      description: |
        Accepts a multipart form upload. Maximum file size is 100 MB.
        The form field name must be `file`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: File to upload (max 100 MB)
      responses:
        "201":
          description: File uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_UploadResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/files/{name}:
    delete:
      tags: [Files]
      operationId: deleteFile
      summary: Delete a file
      description: Permanently deletes the specified file from the uploads directory.
      security:
        - bearerAuth: []
      parameters:
        - name: name
          in: path
          required: true
          description: Filename (no path components)
          schema:
            type: string
            example: report.csv
      responses:
        "204":
          description: File deleted
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  # ─── Docker ────────────────────────────────────────────────────────────────────

  /api/docker/status:
    get:
      tags: [Docker]
      operationId: getDockerStatus
      summary: Get container status
      description: |
        Returns container runtime information when running inside Docker.
        Returns `{available: false}` with HTTP 200 when not in Docker mode.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Docker status (in Docker or not-in-Docker)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_DockerStatusResult"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/docker/info:
    get:
      tags: [Docker]
      operationId: getDockerInfo
      summary: Get Docker engine info
      description: "Returns extended Docker information (stub — currently returns `{inDocker: true}` or not-available)."
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Docker info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_AnyObject"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/docker/restart:
    post:
      tags: [Docker]
      operationId: postDockerRestart
      summary: Restart container
      description: |
        Gracefully stops Node-RED and signals process exit, allowing Docker's
        restart policy to bring the container back up.
        Returns 503 when not running inside Docker.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Container restarting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_MessageResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/docker/stop:
    post:
      tags: [Docker]
      operationId: postDockerStop
      summary: Stop container
      description: |
        Gracefully stops Node-RED and signals process exit.
        Returns 503 when not running inside Docker.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Container stopping
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_MessageResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  # ─── Logs ──────────────────────────────────────────────────────────────────────

  /api/logs:
    get:
      tags: [Logs]
      operationId: getLogs
      summary: Get recent log entries
      description: Returns recent Node-RED runtime log entries from the in-memory buffer.
      security:
        - bearerAuth: []
      parameters:
        - name: tail
          in: query
          description: Number of recent entries to return (max 1000)
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
      responses:
        "200":
          description: Log entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessEnvelope_LogEntryList"
        "401":
          $ref: "#/components/responses/Unauthorized"
    delete:
      tags: [Logs]
      operationId: deleteLogs
      summary: Clear log buffer
      description: Clears all entries from the in-memory log buffer.
      security:
        - bearerAuth: []
      responses:
        "204":
          description: Log buffer cleared
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/logs/stream:
    get:
      tags: [Logs]
      operationId: streamLogs
      summary: Stream logs via SSE
      description: |
        Opens a Server-Sent Events stream for live log tailing.

        **Event types:**
        - `connected` — sent once on connection; payload `{"bufferedCount": N}`
        - `log` — one per log entry; payload is a `LogEntry` object
        - `: ping` — keepalive comment every 15 seconds

        The `replay` parameter controls how many buffered entries are replayed
        on connect before live streaming begins.
      security:
        - bearerAuth: []
      parameters:
        - name: replay
          in: query
          description: Number of buffered entries to replay on connect (max 1000)
          schema:
            type: integer
            minimum: 0
            maximum: 1000
            default: 100
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
                description: Newline-delimited SSE events
        "401":
          $ref: "#/components/responses/Unauthorized"

