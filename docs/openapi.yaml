            timestamp:
              type: string
              format: date-time
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/HealthStatus"

    SuccessEnvelope_StatusResponse:
      allOf:
        - type: object
          required: [success, data, timestamp]
          properties:
            success:
              type: boolean
              enum: [true]
            timestamp:
              type: string
              format: date-time
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/StatusResponse"

    SuccessEnvelope_AuthResponse:
      allOf:
        - type: object
          required: [success, data, timestamp]
          properties:
            success:
              type: boolean
              enum: [true]
            timestamp:
              type: string
              format: date-time
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/AuthResponse"

    SuccessEnvelope_CCUserPublic:
      allOf:
        - type: object
          required: [success, data, timestamp]
          properties:
            success:
              type: boolean
              enum: [true]
            timestamp:
              type: string
              format: date-time
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/CCUserPublic"

    SuccessEnvelope_UserListResponse:
      allOf:
        - type: object
          required: [success, data, timestamp]
          properties:
            success:
              type: boolean
              enum: [true]
            timestamp:
              type: string
              format: date-time
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/UserListResponse"

    SuccessEnvelope_BoolSuccess:
      allOf:
        - type: object
          required: [success, data, timestamp]
          properties:
            success:
              type: boolean
              enum: [true]
            timestamp:
              type: string
              format: date-time
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/BoolSuccess"

    SuccessEnvelope_NodeRedConfig:
      allOf:
        - type: object
          required: [success, data, timestamp]
          properties:
            success:
              type: boolean
              enum: [true]
            timestamp:
              type: string
              format: date-time
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/NodeRedConfig"

    SuccessEnvelope_ValidResult:
      allOf:
        - type: object
          required: [success, data, timestamp]
          properties:
            success:
              type: boolean
              enum: [true]
            timestamp:
              type: string
              format: date-time
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/ValidResult"

    SuccessEnvelope_SettingsDocument:
      allOf:
        - type: object
          required: [success, data, timestamp]
          properties:
            success:
              type: boolean
              enum: [true]
            timestamp:
              type: string
              format: date-time
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/SettingsDocument"

    SuccessEnvelope_HostStatus:
