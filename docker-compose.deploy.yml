# Local deployment for this server (not committed)
#
# Build with `docker compose -f docker-compose.deploy.yml up --build`. The
# Dockerfile.server-local pulls the nrcc binary from a shared base image
# built via bake (see docker-bake.hcl); the `additional_contexts` block
# tells compose to inline-build the `base` target and pass it through.
services:
  nrcc:
    image: nrcc-local:dev
    build:
      context: .
      dockerfile: Dockerfile.server-local
      additional_contexts:
        base: target:base
    container_name: nrcc
    restart: unless-stopped
    ports:
      - "127.0.0.1:3010:3001"   # nrcc web UI + API via Nginx Proxy Manager only
      - "127.0.0.1:1881:1880"   # Node-RED editor, local/NPM/Tailscale only
    environment:
      PORT: "3001"
      DATA_DIR: /data
      JWT_SECRET: "6ff9169ae31fe502b0c2cb1172f0d8acfbea4f308afa37863dd85774097b7a03"
      NODE_RED_CMD: node-red
      NRCC_BOOTSTRAP_INTERACTIVE: "false"
    volumes:
      - nrcc_data:/data
      - nrcc_backups:/data/backups
      - nrcc_node_modules:/data/node_modules
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/auth/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  nrcc_data:
    driver: local
  nrcc_backups:
    driver: local
  nrcc_node_modules:
    driver: local
