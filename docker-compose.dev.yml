# ─────────────────────────────────────────────────────────────────────────────
# nrcc — Docker dev environment
#
# Architecture:
#   backend   → Go + air (hot reload), port 3001, runs node-red as child process
#   frontend  → Vite dev server (HMR), port 5173, proxies /api → backend:3001
#
# Usage:
#   docker compose -f docker-compose.dev.yml up
#   docker compose -f docker-compose.dev.yml up --build   # after go.mod changes
#   docker compose -f docker-compose.dev.yml down
#
# Open in browser:
#   http://localhost:5173  ← React app with HMR
#   http://localhost:3001  ← Go API directly
#   http://localhost:1880  ← Node-RED editor
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Go backend with air hot reload ────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /workspace
    volumes:
      # Mount entire nrcc source (air watches .go files and rebuilds)
      - .:/workspace
      # Separate volumes for Go caches (fast rebuilds between restarts)
      - go_mod_cache:/root/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
      # Data persistence
      - nrcc_dev_data:/data
      - nrcc_dev_backups:/data/backups
      - nrcc_dev_node_modules:/data/node_modules
    ports:
      - "3001:3001"   # nrcc API
      - "1880:1880"   # Node-RED editor
    environment:
      PORT: "3001"
      DATA_DIR: /data
      JWT_SECRET: "dev-secret-not-for-production"
      NODE_RED_CMD: node-red
    restart: unless-stopped

  # ── React frontend with Vite HMR ─────────────────────────────────────────
  frontend:
    image: node:20
    working_dir: /app
    volumes:
      # Mount only frontend source (not entire repo)
      - ./frontend:/app
      # Separate volume for node_modules (avoids overwriting with host)
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"   # Vite dev server with HMR
    environment:
      # Proxy /api calls to backend container
      VITE_API_TARGET: "http://backend:3001"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  nrcc_dev_data:
  nrcc_dev_backups:
  nrcc_dev_node_modules:
  frontend_node_modules:
  go_mod_cache:
  go_build_cache:
