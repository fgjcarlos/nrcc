name: PR Validation

on:
  pull_request:
  push:
    branches: [main]

# Cancel previous runs on the same PR when new commits land
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  backend:
    name: Backend (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: go.sum

      - name: Download modules
        run: go mod download

      # `embed.go` declares `//go:embed frontend/dist` — the pattern needs at
      # least one *embeddable* file or `go vet`/`build` fails. Go embed skips
      # files starting with `.` or `_` by default, so a dotfile is not enough.
      # A real frontend build isn't needed for backend validation either, so a
      # plain placeholder satisfies the directive without wasting CI time.
      - name: Stub frontend/dist for go:embed
        run: |
          mkdir -p frontend/dist
          echo "ci placeholder" > frontend/dist/placeholder

      - name: Vet
        run: go vet ./...

      - name: Test (race detector)
        run: go test -race ./...

      - name: Build (all packages)
        run: go build ./...

  frontend:
    name: Frontend (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["22"]
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test --run

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E smoke tests
        run: pnpm test:e2e

      - name: Build
        run: pnpm build

  openapi:
    name: OpenAPI Spec
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Validate OpenAPI spec
        run: npx --yes @redocly/cli lint docs/openapi.yaml --format stylish

  lint:
    name: Lint (golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.12"
          cache-dependency-path: go.sum

      # golangci-lint type-checks the packages, so go:embed needs a real file.
      # Same placeholder trick as the backend job.
      - name: Stub frontend/dist for go:embed
        run: |
          mkdir -p frontend/dist
          echo "ci placeholder" > frontend/dist/placeholder

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          # Ratchet: only gate code changed in this PR; ~74 pre-existing issues
          # are grandfathered. Remove once the backlog is burned down.
          only-new-issues: true

  scripts:
    name: Install script
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # shellcheck is preinstalled on ubuntu-latest runners.
      - name: ShellCheck
        run: |
          shellcheck scripts/install.sh
          shellcheck docs/install.sh

      - name: POSIX sh syntax check
        run: |
          sh -n scripts/install.sh
          sh -n docs/install.sh

      - name: docs/install.sh in sync with scripts/install.sh
        run: |
          if ! diff -q scripts/install.sh docs/install.sh; then
            echo "::error::docs/install.sh (served by GitHub Pages at get.nrcc.dev) is out of sync with scripts/install.sh"
            exit 1
          fi
