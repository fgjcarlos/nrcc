name: Deploy Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  # Allow manual runs from the Actions tab — useful when retrying a stuck deploy
  # or when the landing content changed via a path the trigger filter missed.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; let the in-flight one finish before
# the next starts so we never publish a half-uploaded artifact.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy docs/ to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload docs/ as Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./docs

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v5
