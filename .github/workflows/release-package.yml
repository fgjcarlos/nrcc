name: Release Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Artifact version label (defaults to tag name or manual-<sha>)"
        required: false
        type: string

jobs:
  package:
    name: Build release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Resolve artifact version
        id: version
        shell: bash
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=manual-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build packaged artifacts
        run: ./scripts/package-release.sh
        env:
          VERSION: ${{ steps.version.outputs.value }}
          FRONTEND_INSTALL_MODE: always

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nrcc-release-${{ steps.version.outputs.value }}
          path: dist/release/*
          if-no-files-found: error
