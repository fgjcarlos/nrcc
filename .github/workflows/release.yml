name: Release

on:
  push:
    tags:
      - "v*"

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/nrcc

jobs:
  # ── Build & push multi-arch Docker image ────────────────────────────────────
  docker:
    name: Docker multi-arch build & push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up QEMU (for cross-arch emulation)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Cross-compile binaries & attach to GitHub Release ───────────────────────
  binaries:
    name: Release binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.12.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build frontend
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Build binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          LDFLAGS="-s -w -X main.Version=${VERSION}"

          # Linux (static — Alpine/glibc compatible)
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64  go build -tags netgo -ldflags="${LDFLAGS} -extldflags=-static" -o dist/nrcc-linux-amd64 .
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64  go build -tags netgo -ldflags="${LDFLAGS} -extldflags=-static" -o dist/nrcc-linux-arm64 .
          # Pin GOARM=7 so the armv7 ABI matches the linux/arm/v7 Docker image and does
          # not silently regress to GOARM=6 if built with an older toolchain default.
          CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=7 go build -tags netgo -ldflags="${LDFLAGS} -extldflags=-static" -o dist/nrcc-linux-armv7 .

          # macOS
          GOOS=darwin  GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/nrcc-darwin-amd64 .
          GOOS=darwin  GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/nrcc-darwin-arm64 .

          # Windows
          GOOS=windows GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/nrcc-windows-amd64.exe .

          ls -lh dist/

      - name: Generate checksums
        working-directory: dist
        run: |
          # Generate combined SHA256SUMS file
          sha256sum * > SHA256SUMS

          # Generate per-binary sidecar files with normalized filename
          for binary in nrcc-*; do
            sha256sum "$binary" | sed 's/nrcc-.*/nrcc/' > "$binary.sha256"
          done

          ls -lh SHA256SUMS *.sha256

      - name: Upload binaries to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true

  # ── Post-release smoke test of the public install URL ───────────────────────
  # NON-BLOCKING for now: get.nrcc.dev (GitHub Pages custom domain) is not live
  # yet — there is no docs/CNAME and the host does not resolve. This job surfaces
  # a warning in the Actions log without failing the release. Once DNS + Pages +
  # docs/CNAME are configured, remove `continue-on-error` to make it a hard gate.
  smoke-install-url:
    name: Install URL smoke (non-blocking)
    runs-on: ubuntu-latest
    needs: [binaries]
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: Curl get.nrcc.dev/install.sh (HTTP 200 + shebang)
        run: |
          code=$(curl -fsSL -o /tmp/install.sh -w '%{http_code}' --max-time 30 \
            https://get.nrcc.dev/install.sh) || true
          echo "HTTP status: ${code:-000}"
          if [ "${code:-000}" != "200" ]; then
            echo "::warning::get.nrcc.dev/install.sh returned HTTP ${code:-000} (expected 200); DNS/Pages may not be live yet."
            exit 1
          fi
          if ! head -1 /tmp/install.sh | grep -qE '^#!/'; then
            echo "::warning::Served install.sh is missing a shebang on its first line."
            exit 1
          fi
          echo "OK: install.sh served with HTTP 200 and a shebang."
