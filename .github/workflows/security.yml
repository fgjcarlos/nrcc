name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Monday 06:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  security-events: write

jobs:
  # ── Go vulnerability check ─────────────────────────────────────────────────
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Stub frontend/dist for go:embed
        run: |
          mkdir -p frontend/dist
          echo "ci placeholder" > frontend/dist/placeholder

      - name: Run govulncheck
        run: govulncheck ./...

  # ── Frontend dependency audit ───────────────────────────────────────────────
  npm-audit:
    name: pnpm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit (critical + high)
        run: pnpm audit --audit-level high

  # ── Container image scan ────────────────────────────────────────────────────
  trivy:
    name: Trivy container scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build -t nrcc:scan .

      # Non-blocking: base image (nodered/node-red) carries upstream CVEs
      # outside our control. Results are uploaded to GitHub Security tab.
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: nrcc:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
