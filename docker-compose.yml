# nrcc — single compose, single Dockerfile, builds locally.
#
# One service, one nrcc + one Node-RED process. To run more stacks on the
# same host, copy this file and remap ports + volume name.
#
#   docker compose up --build
#   open http://localhost:3001 (nrcc UI) and http://localhost:1880 (Node-RED)
#
# Set JWT_SECRET via .env or host env; if absent nrcc generates one in /data.
services:
  nrcc:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nrcc
    restart: unless-stopped
    ports:
      - "3001:3001"   # nrcc web UI + API
      - "1880:1880"   # Node-RED editor
    environment:
      PORT: "3001"
      DATA_DIR: /data
      NODE_RED_CMD: node-red
      JWT_SECRET: "${JWT_SECRET:-}"
    volumes:
      - nrcc_data:/data
      - nrcc_backups:/data/backups
      - nrcc_node_modules:/data/node_modules
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  nrcc_data:
  nrcc_backups:
  nrcc_node_modules:
